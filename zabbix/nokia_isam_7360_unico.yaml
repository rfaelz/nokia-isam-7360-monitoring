    discovery_rules:
    - uuid: 3b1ee791f64e4138aab6e75f940b5baf
      name: Sensores de temperatura de placa
      type: SNMP_AGENT
      key: nokia.isam.boardtemp.discovery
      snmp_oid: discovery[{#ACTUAL},1.3.6.1.4.1.637.61.1.23.10.1.2]
      delay: 1h
      lifetime: 30d
      description: Descobre todos os sensores de temperatura (NT-A/NT-B e placas LT) via walk da tabela 637.*.23.10.
      item_prototypes:
      - uuid: 9b447fd05fde4f7084384fb6ff29a09f
        name: Temperatura {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.2.{#SNMPINDEX}
        key: nokia.isam.boardtemp.actual[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: C
        tags:
        - tag: component
          value: Temperature
        - tag: board
          value: '{#BOARD}'
        description: ACTUAL_TEMPERATURE - temperatura atual do sensor (graus Celsius).
      - uuid: ddab5c9cf354440bab52f8122e1a9012
        name: Limiar TCA alto {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.4.{#SNMPINDEX}
        key: nokia.isam.boardtemp.tcahigh[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: C
        tags:
        - tag: component
          value: Temperature
        - tag: board
          value: '{#BOARD}'
        description: TCATHRESHOLDHIGH - temperatura em que a OLT dispara o alarme TCA.
      - uuid: 09241930f2954d30b91354adbcbef3e5
        name: Limiar TCA baixo (clear) {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.3.{#SNMPINDEX}
        key: nokia.isam.boardtemp.tcalow[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: C
        tags:
        - tag: component
          value: Temperature
        - tag: board
          value: '{#BOARD}'
        description: TCATHRESHOLDLOW - temperatura em que o alarme TCA limpa (histerese).
      - uuid: 2a1ece60f6f74357b77598d8f038523b
        name: Limiar shutdown alto {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.6.{#SNMPINDEX}
        key: nokia.isam.boardtemp.shuthigh[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: C
        tags:
        - tag: component
          value: Temperature
        - tag: board
          value: '{#BOARD}'
        description: SHUTDOWNTHRESHOLDHIGH - temperatura em que a placa entra em shutdown.
      - uuid: 62a8c4b0e7364e06a0d2b905b2319053
        name: Limiar shutdown baixo (clear) {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.5.{#SNMPINDEX}
        key: nokia.isam.boardtemp.shutlow[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: C
        tags:
        - tag: component
          value: Temperature
        - tag: board
          value: '{#BOARD}'
        description: SHUTDOWNTHRESHOLDLOW - temperatura em que o alarme de shutdown limpa (histerese).
      trigger_prototypes:
      - uuid: 2fc9bdfa25464225b425e48a47559465
        expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])>=last(/Nokia ISAM 7360/nokia.isam.boardtemp.tcahigh[{#SNMPINDEX}])
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])<last(/Nokia ISAM 7360/nokia.isam.boardtemp.tcalow[{#SNMPINDEX}])
        name: '{#BOARD} sensor {#SENSOR}: temperatura em nivel de alarme (TCA)'
        priority: AVERAGE
        manual_close: 'YES'
      - uuid: a9014e4f3b7e466b9d70a5bb519a1071
        expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])>=last(/Nokia ISAM 7360/nokia.isam.boardtemp.shuthigh[{#SNMPINDEX}])
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])<last(/Nokia ISAM 7360/nokia.isam.boardtemp.shutlow[{#SNMPINDEX}])
        name: '{#BOARD} sensor {#SENSOR}: temperatura em nivel de SHUTDOWN'
        priority: DISASTER
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var idx = String(r['{#SNMPINDEX}']);\n    var dot = idx.indexOf('.');\n    var board = parseInt(idx.substring(0, dot), 10);\n    r['{#SENSOR}'] = idx.substring(dot + 1);\n    r['{#BOARD}'] = board === 4353 ? 'NT-A'\n                  : board === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (board - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }"
    - uuid: ee29e14d86ba49119afeeb09cdaf7d8e
      name: Placas (uso de memoria)
      type: SNMP_AGENT
      key: nokia.isam.mem.discovery
      snmp_oid: discovery[{#TOTAL},1.3.6.1.4.1.637.61.1.9.29.2.1.1]
      delay: 1h
      lifetime: 30d
      description: Descobre NT-A/NT-B e placas LT via tabela 637.*.9.29 (uso de memoria).
      item_prototypes:
      - uuid: ba3c7d21a08549b49ff5669d6ab1d1cf
        name: Memoria total {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.2.1.1.{#SNMPINDEX}
        key: nokia.isam.mem.total[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: B
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1048576'
        tags:
        - tag: component
          value: Memory
        - tag: board
          value: '{#BOARD}'
        description: TOTALMEM - memoria total da placa (convertida de MB para bytes).
      - uuid: 9893cf982eb241878bbc43cbea1d3bb2
        name: Memoria usada {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.2.1.2.{#SNMPINDEX}
        key: nokia.isam.mem.abs[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: B
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1048576'
        tags:
        - tag: component
          value: Memory
        - tag: board
          value: '{#BOARD}'
        description: MEMUSAGEABSOLUTE - memoria usada da placa (convertida de MB para bytes).
      trigger_prototypes:
      - uuid: 22fc69d518494f6c89dc647034bfe244
        expression: 100*last(/Nokia ISAM 7360/nokia.isam.mem.abs[{#SNMPINDEX}])/last(/Nokia ISAM 7360/nokia.isam.mem.total[{#SNMPINDEX}])>={$MEM.WARN}
        name: '{#BOARD}: uso de memoria acima de {$MEM.WARN}%'
        priority: WARNING
        manual_close: 'YES'
      - uuid: e41abc46426444c2ba91047ea1a681ec
        expression: 100*last(/Nokia ISAM 7360/nokia.isam.mem.abs[{#SNMPINDEX}])/last(/Nokia ISAM 7360/nokia.isam.mem.total[{#SNMPINDEX}])>={$MEM.CRIT}
        name: '{#BOARD}: uso de memoria acima de {$MEM.CRIT}%'
        priority: HIGH
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var b = parseInt(String(r['{#SNMPINDEX}']), 10);\n    r['{#BOARD}'] = b === 4353 ? 'NT-A'\n                  : b === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (b - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }"
    - uuid: 829a13f9deb24b5a9f8a936a857c2c88
