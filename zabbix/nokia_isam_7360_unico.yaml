  - uuid: 7527b84819be4a2eaf98aa816fc3cfdf
    template: Nokia ISAM 7360
    name: Nokia ISAM 7360
    description: 'Monitoramento completo da Nokia 7360 ISAM FX (nivel de OLT), em um unico

      template: utilizacao/trafego por PON, opticos das XFPs de uplink,

      temperatura e memoria de todas as placas (LLD), uptime de gerencia e CPU

      por placa (LLD). Vincule este template ao host (interface SNMP + macro

      {$SNMP_COMMUNITY}). Pre-requisitos na OLT: SET-PMMODE-PONUTIL (PONs) e

      ED-CPULOAD::ALL::START (CPU).'
    groups:
    - name: Templates/Nokia ISAM
    items:
