        key: nokia.isam.cpu.avg[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: '%'
        tags:
        - tag: component
          value: CPU
        - tag: board
          value: '{#BOARD}'
        description: CPULOADAVERAGE - media de carga da CPU da placa desde o STARTTIME do monitor.
      - uuid: 9b5a1630ebd94dc29d3dbf9b3300c946
        name: Status do monitor de CPU {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.1.1.5.{#SNMPINDEX}
        key: nokia.isam.cpu.status[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        valuemap:
          name: Nokia CPU monitor status
        tags:
        - tag: component
          value: CPU
        - tag: board
          value: '{#BOARD}'
        description: OPERATESTATUS - estado do monitor de CPU (3 = PROCEEDING). Se != 3, a media pode estar congelada.
      - uuid: 925ad179fc7f46f8b13957ffa60b8c19
        name: Inicio do monitor de CPU {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.1.1.2.{#SNMPINDEX}
        key: nokia.isam.cpu.start[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        units: unixtime
        tags:
        - tag: component
          value: CPU
        - tag: board
          value: '{#BOARD}'
        description: STARTTIME - momento em que o monitor de CPU foi iniciado (epoch).
      trigger_prototypes:
      - uuid: 5d91748e32ae4cc6966b4adbad127cfb
        expression: min(/Nokia ISAM 7360/nokia.isam.cpu.avg[{#SNMPINDEX}],15m)>={$CPU.WARN}
        name: '{#BOARD}: CPU media acima de {$CPU.WARN}%'
        priority: WARNING
        manual_close: 'YES'
      - uuid: 619dd4dcd72146e589a1dd9b2209c9ea
        expression: min(/Nokia ISAM 7360/nokia.isam.cpu.avg[{#SNMPINDEX}],15m)>={$CPU.CRIT}
        name: '{#BOARD}: CPU media acima de {$CPU.CRIT}%'
        priority: HIGH
        manual_close: 'YES'
      - uuid: 6480af411ba1480fbb46bc9350f4d639
        expression: last(/Nokia ISAM 7360/nokia.isam.cpu.status[{#SNMPINDEX}])<>3
        name: '{#BOARD}: monitor de CPU nao esta ativo (CPU pode estar congelada)'
        priority: INFO
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var b = parseInt(String(r['{#SNMPINDEX}']), 10);\n    r['{#BOARD}'] = b === 4353 ? 'NT-A'\n                  : b === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (b - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }"
    - uuid: 6e4e60eaa8b54957941af4b6b0946b13
      name: Portas PON (PONUTIL)
      type: SNMP_AGENT
      key: nokia.isam.pon.discovery
      snmp_oid: discovery[{#ACTIVEONTS},1.3.6.1.4.1.637.61.1.35.21.57.1.16]
      delay: 1h
      lifetime: 30d
      description: 'Descobre as portas PON pela tabela PONUTIL (walk da coluna .16).

        PRE-REQUISITO por porta: SET-PMMODE-PONUTIL::PONUTIL-1-1-s-p::::PMSTATE=PMENABLED.

        Filtro padrao: cria apenas PONs com >=1 ONT ativa (remova o filtro p/ todas).'
      filter:
        evaltype: AND
        conditions:
        - macro: '{#ACTIVEONTS}'
          value: ^[1-9][0-9]*$
          formulaid: A
      item_prototypes:
      - uuid: ccd52b391d824c63866570f283544d26
        name: 'PON {#PON}: utilizacao downstream'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.6.{#SNMPINDEX}
        key: nokia.isam.pon.txtotutil[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: TXTOTUTIL - utilizacao total de transmissao (downstream) da PON, calculada pela OLT.
      - uuid: 99eaa1e73e1148f59eef18257ce3b70f
        name: 'PON {#PON}: utilizacao upstream'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.7.{#SNMPINDEX}
        key: nokia.isam.pon.rxtotutil[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: RXTOTUTIL - utilizacao total de recepcao (upstream) da PON.
      - uuid: 49eb80ee7b5a4d32b1d09baeeae95a77
        name: 'PON {#PON}: ONTs com trafego'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.16.{#SNMPINDEX}
        key: nokia.isam.pon.numactiveonts[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: NUMACTIVEONTS - ONTs que passaram trafego no intervalo. Nao e inventario; oscila com o trafego.
      - uuid: fb93328e79ec47d786bf4c4ed2c862c0
        name: 'PON {#PON}: frames descartados RX'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.28.{#SNMPINDEX}
        key: nokia.isam.pon.rxtotdropfrm[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        value_type: UNSIGNED
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - var v=value;var c=v.indexOf(':');if(c>=0&&/[A-Za-z]/.test(v.substring(0,c)))v=v.substring(c+1);var h=v.replace(/[^0-9A-Fa-f]/g,'');return h.length?parseInt(h,16):0;
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: RXTOTDROPFRM - frames descartados na recepcao no intervalo (acumula no bin de 5 min).
      - uuid: f28710787f2b493b8d14d1d62dfb8730
        name: 'PON {#PON}: banda downstream'
        type: DEPENDENT
        key: nokia.isam.pon.down.bps[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 730d
        value_type: FLOAT
        units: bps
        master_item:
          key: nokia.isam.pon.txtotutil[{#SNMPINDEX}]
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '{$PON.DOWN.BPS_PER_PCT}'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: Banda downstream estimada = utilizacao(%) x taxa da linha ({$PON.DOWN.BPS_PER_PCT}).
      - uuid: c10491390e364d2e94c3792e75b633e3
        name: 'PON {#PON}: banda upstream'
        type: DEPENDENT
        key: nokia.isam.pon.up.bps[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 730d
        value_type: FLOAT
        units: bps
        master_item:
          key: nokia.isam.pon.rxtotutil[{#SNMPINDEX}]
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '{$PON.UP.BPS_PER_PCT}'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        description: Banda upstream estimada = utilizacao(%) x taxa da linha ({$PON.UP.BPS_PER_PCT}).
      trigger_prototypes:
      - uuid: 8c7b180697f644ac8d220479e5d29d4a
        expression: min(/Nokia ISAM 7360/nokia.isam.pon.txtotutil[{#SNMPINDEX}],15m)>{$PON.UTIL.WARN}
        name: 'PON {#PON}: utilizacao downstream acima de {$PON.UTIL.WARN}%'
        priority: WARNING
        manual_close: 'YES'
      - uuid: fd230e12f2084c62bab92c083f852dce
        expression: min(/Nokia ISAM 7360/nokia.isam.pon.rxtotutil[{#SNMPINDEX}],15m)>{$PON.UTIL.WARN}
        name: 'PON {#PON}: utilizacao upstream acima de {$PON.UTIL.WARN}%'
        priority: WARNING
        manual_close: 'YES'
      - uuid: 0257e7a3d41f44ca8cb80599f1428605
        expression: last(/Nokia ISAM 7360/nokia.isam.pon.rxtotdropfrm[{#SNMPINDEX}])>{$PON.DROP.WARN}
        name: 'PON {#PON}: frames descartados (RX) acima de {$PON.DROP.WARN}'
        priority: AVERAGE
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var idx = parseInt(String(r['{#SNMPINDEX}']), 10);\n    var off = idx - 0x05A00000;\n    var slot = Math.floor(off / 0x02000000) + 1;\n    var rem = off % 0x02000000;\n    var port = Math.floor(rem / 0x10000) + 1;\n    r['{#PON}'] = '1/1/' + slot + '/' + port;\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }"
