    - uuid: 00bf9c96af0a430ab0470e89f55bc7c0
      name: Provisioned ONTs (bulk walk)
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.4.1.637.61.1.35.11.4.1.1]
      key: nokia.isam.ont.walk
      delay: 1h
      history: 1h
      trends: '0'
      value_type: TEXT
      description: 'Single SNMP walk of the provisioned-ONT table (.637...35.11.4.1.1), one row per

        provisioned ONT indexed by <PON ifIndex>.<ONT id>. Master item; per-port counts are

        derived from it as dependent items (one walk on the OLT, counting done in Zabbix).


        INTERVAL = 1h on purpose: ONU inventory changes slowly, and on large OLTs (thousands

        of ONTs) a frequent full-column walk stresses the ISAM control-plane CPU. Before

        enabling on a big OLT, test GETBULK response and watch the NT CPU item during the walk.'
      tags:
