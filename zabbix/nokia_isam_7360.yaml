    - uuid: 7ae22dc9978f42e49ff0694dea14da49
      name: Active alarms table (bulk walk)
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.4.1.637.61.1.3.7.1.2,1.3.6.1.4.1.637.61.1.3.7.1.3,1.3.6.1.4.1.637.61.1.3.7.1.4]
      key: nokia.isam.alarm.typewalk
      delay: 5m
      history: 1h
      trends: '0'
      value_type: TEXT
      description: 'Single walk of three columns of the current-alarm table: alarm type (.2),

        alarm status bitmap (.3) and affected-object ifIndex (.4). The table only holds

        ACTIVE alarms, so its size scales with active fault count, not subscriber count -

        confirmed safe on a busy OLT (425 active alarms observed, single walk, no issue).


        Verified against CLI on TWO OLTs: type 40 (ont-ploam) status bit 32768 = ont-ploam-

        inactive, bit 262144 = ont-ploam-dying-gasp (both confirmed with >85% ID match across

        independent captures, gap explained by alarm churn between CLI and walk timing).


        IMPORTANT CAVEAT: the CLI "ont-ploam" query groups TWO different SNMP types - type 40

        AND type 41 (ont-gen). ont-ploam-sig-degrade lives under type 41, not 40. Type 41 is a

        broad bucket shared by many unrelated ont-gen alarms; its status bits do not cleanly

        isolate individual alarm names (a candidate bit for sig-degrade matched only 8/9 known

        cases while also matching 113 unrelated ONTs - rejected, would massively overcount).

        ont-ploam-loss-sig (LOS) has not been observed active on any tested OLT, so its type/

        status is UNCONFIRMED. Do not assume it is type 40 or add a LOS item without validating

        via a before/after walk diff around a controlled test (e.g. unplug a test ONT fiber).'
      tags:
      - tag: component
        value: Alarms
    - uuid: a049395bba99403190aab20d2a5cc85a
      name: Active ONT PLOAM alarms (LOS/dying-gasp/...)
      type: DEPENDENT
      key: nokia.isam.alarm.ontploam
      delay: '0'
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      master_item:
        key: nokia.isam.alarm.typewalk
      description: 'Number of active ont-ploam alarms of type 40 (dying-gasp + inactive combined).

        For cause-specific alerting see nokia.isam.alarm.dyinggasp (power) and

        nokia.isam.alarm.ontinactive (fiber) - split by validated down-reason.

        Does not include sig-degrade (unreliable to isolate, see typewalk item description).'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var n=0;for(var k in p.T){if(p.T[k]===40)n++;}return n;
      tags:
      - tag: component
        value: Alarms
      triggers: []
    - uuid: dd38d41b3ab8428cbc91281e3d1aca72
      name: Active ONT dying-gasp alarms
      type: DEPENDENT
      key: nokia.isam.alarm.dyinggasp
      delay: '0'
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      master_item:
        key: nokia.isam.alarm.typewalk
      description: 'ONTs whose active PLOAM alarm includes ont-ploam-dying-gasp (status bit 262144).

        Dying gasp = the ONT reported power loss before going down.


        Cross-checked against "show equipment ont operational-data" on 14 live ONTs across two

        OLTs: every dying-gasp alarm had loss-of-signal=no / down-reason=dying-gasp (power loss,

        graceful ONT shutdown); every inactive alarm had loss-of-signal=yes / down-reason=ploam-

        inactive (fiber/signal problem: LOS, degraded signal that progressed to a drop, etc.),

        zero exceptions. So: dying-gasp = power; inactive = fiber-side issue.'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var n=0;for(var k in p.T){if(p.T[k]===40 && ((p.S[k]||0) & 262144))n++;}return n;
      tags:
      - tag: component
        value: Alarms
      triggers: []
    - uuid: 8b55dfe8c7de410cad10009e8d3f751d
      name: Active ONT inactive alarms
      type: DEPENDENT
      key: nokia.isam.alarm.ontinactive
      delay: '0'
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      master_item:
        key: nokia.isam.alarm.typewalk
      description: 'ONTs whose active PLOAM alarm includes ont-ploam-inactive (status bit 32768).

        Inactive = ONT dropped due to a fiber/signal problem (LOS, degraded signal, etc.),

        NOT a power loss.


        Cross-checked against "show equipment ont operational-data" on 14 live ONTs across two

        OLTs: every dying-gasp alarm had loss-of-signal=no / down-reason=dying-gasp (power loss,

        graceful ONT shutdown); every inactive alarm had loss-of-signal=yes / down-reason=ploam-

        inactive (fiber/signal problem: LOS, degraded signal that progressed to a drop, etc.),

        zero exceptions. So: dying-gasp = power; inactive = fiber-side issue.'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var n=0;for(var k in p.T){if(p.T[k]===40 && ((p.S[k]||0) & 32768))n++;}return n;
      tags:
      - tag: component
        value: Alarms
      triggers: []
    discovery_rules:
    - uuid: 3b1ee791f64e4138aab6e75f940b5baf
      name: Board temperature sensors
      type: SNMP_AGENT
      snmp_oid: discovery[{#ACTUAL},1.3.6.1.4.1.637.61.1.23.10.1.2]
      key: nokia.isam.boardtemp.discovery
      delay: 1h
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: Discovers all temperature sensors (NT-A/NT-B and LT boards) via walk of table 637.*.23.10.
      item_prototypes:
      - uuid: 9b447fd05fde4f7084384fb6ff29a09f
        name: Temperature {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.2.{#SNMPINDEX}
        key: nokia.isam.boardtemp.actual[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        units: C
        description: ACTUAL_TEMPERATURE - current sensor temperature (degrees Celsius).
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Temperature
      - uuid: 2a1ece60f6f74357b77598d8f038523b
        name: Shutdown high threshold {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.6.{#SNMPINDEX}
        key: nokia.isam.boardtemp.shuthigh[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        units: C
        description: SHUTDOWNTHRESHOLDHIGH - temperature at which the board shuts down.
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Temperature
      - uuid: 62a8c4b0e7364e06a0d2b905b2319053
        name: Shutdown low threshold (clear) {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.5.{#SNMPINDEX}
        key: nokia.isam.boardtemp.shutlow[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        units: C
        description: SHUTDOWNTHRESHOLDLOW - temperature at which the shutdown alarm clears (hysteresis).
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Temperature
      - uuid: ddab5c9cf354440bab52f8122e1a9012
        name: TCA high threshold {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.4.{#SNMPINDEX}
        key: nokia.isam.boardtemp.tcahigh[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        units: C
        description: TCATHRESHOLDHIGH - temperature at which the OLT raises the TCA alarm.
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Temperature
      - uuid: 09241930f2954d30b91354adbcbef3e5
        name: TCA low threshold (clear) {#BOARD} sensor {#SENSOR}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.23.10.1.3.{#SNMPINDEX}
        key: nokia.isam.boardtemp.tcalow[{#SNMPINDEX}]
        delay: 1h
        history: 90d
        trends: 730d
        units: C
        description: TCATHRESHOLDLOW - temperature at which the TCA alarm clears (hysteresis).
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Temperature
      trigger_prototypes:
      - uuid: 2fc9bdfa25464225b425e48a47559465
        expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])>=last(/Nokia ISAM 7360/nokia.isam.boardtemp.tcahigh[{#SNMPINDEX}])
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])<last(/Nokia ISAM 7360/nokia.isam.boardtemp.tcalow[{#SNMPINDEX}])
        name: '{#BOARD} sensor {#SENSOR}: temperature at alarm level (TCA)'
        priority: AVERAGE
        manual_close: 'YES'
      - uuid: a9014e4f3b7e466b9d70a5bb519a1071
        expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])>=last(/Nokia ISAM 7360/nokia.isam.boardtemp.shuthigh[{#SNMPINDEX}])
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Nokia ISAM 7360/nokia.isam.boardtemp.actual[{#SNMPINDEX}])<last(/Nokia ISAM 7360/nokia.isam.boardtemp.shutlow[{#SNMPINDEX}])
        name: '{#BOARD} sensor {#SENSOR}: temperature at SHUTDOWN level'
        priority: DISASTER
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var idx = String(r['{#SNMPINDEX}']);\n    var dot = idx.indexOf('.');\n    var board = parseInt(idx.substring(0, dot), 10);\n    r['{#SENSOR}'] = idx.substring(dot + 1);\n    r['{#BOARD}'] = board === 4353 ? 'NT-A'\n                  : board === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (board - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }\n"
    - uuid: 829a13f9deb24b5a9f8a936a857c2c88
      name: CPU per board
      type: SNMP_AGENT
      snmp_oid: discovery[{#CPU},1.3.6.1.4.1.637.61.1.9.29.1.1.4]
      key: nokia.isam.cpu.discovery
      delay: 1h
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: 'Discovers per-board CPU via table 637.*.9.29.1.

        PREREQUISITE: start the monitor with "admin system cpu-load <board> monitor start".

        Verify walk: snmpwalk -v2c -c <community> <ip> 1.3.6.1.4.1.637.61.1.9.29.1.1.4

        '
      item_prototypes:
      - uuid: 227b9d3d552d4c808049d6a025855919
        name: CPU load {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.1.1.4.{#SNMPINDEX}
        key: nokia.isam.cpu.avg[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        units: '%'
        description: CPULOADAVERAGE - board CPU load average since the monitor STARTTIME.
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: CPU
        trigger_prototypes:
        - uuid: 619dd4dcd72146e589a1dd9b2209c9ea
          expression: min(/Nokia ISAM 7360/nokia.isam.cpu.avg[{#SNMPINDEX}],15m)>={$CPU.CRIT}
          name: '{#BOARD}: CPU load above {$CPU.CRIT}%'
          priority: HIGH
          manual_close: 'YES'
        - uuid: 5d91748e32ae4cc6966b4adbad127cfb
          expression: min(/Nokia ISAM 7360/nokia.isam.cpu.avg[{#SNMPINDEX}],15m)>={$CPU.WARN}
          name: '{#BOARD}: CPU load above {$CPU.WARN}%'
          priority: WARNING
          manual_close: 'YES'
      - uuid: 9b5a1630ebd94dc29d3dbf9b3300c946
        name: CPU monitor status {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.1.1.5.{#SNMPINDEX}
        key: nokia.isam.cpu.status[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        description: OPERATESTATUS - CPU monitor state (3 = PROCEEDING). If != 3, the average may be stale.
        valuemap:
          name: Nokia CPU monitor status
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: CPU
        trigger_prototypes:
        - uuid: 6480af411ba1480fbb46bc9350f4d639
          expression: last(/Nokia ISAM 7360/nokia.isam.cpu.status[{#SNMPINDEX}])<>3
          name: '{#BOARD}: CPU monitor is not active (CPU value may be stale)'
          priority: INFO
          manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var b = parseInt(String(r['{#SNMPINDEX}']), 10);\n    r['{#BOARD}'] = b === 4353 ? 'NT-A'\n                  : b === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (b - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }\n"
    - uuid: ee29e14d86ba49119afeeb09cdaf7d8e
      name: Boards (memory usage)
      type: SNMP_AGENT
      snmp_oid: discovery[{#TOTAL},1.3.6.1.4.1.637.61.1.9.29.2.1.1]
      key: nokia.isam.mem.discovery
      delay: 1h
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: Discovers NT-A/NT-B and LT boards via table 637.*.9.29 (memory usage).
      item_prototypes:
      - uuid: 9893cf982eb241878bbc43cbea1d3bb2
        name: Memory used {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.2.1.2.{#SNMPINDEX}
        key: nokia.isam.mem.abs[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        units: B
        description: MEMUSAGEABSOLUTE - board memory used (converted from MB to bytes).
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1048576'
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Memory
      - uuid: ba3c7d21a08549b49ff5669d6ab1d1cf
        name: Memory total {#BOARD}
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.9.29.2.1.1.{#SNMPINDEX}
        key: nokia.isam.mem.total[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        units: B
        description: TOTALMEM - board total memory (converted from MB to bytes).
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1048576'
        tags:
        - tag: board
          value: '{#BOARD}'
        - tag: component
          value: Memory
      trigger_prototypes:
      - uuid: e41abc46426444c2ba91047ea1a681ec
        expression: 100*last(/Nokia ISAM 7360/nokia.isam.mem.abs[{#SNMPINDEX}])/last(/Nokia ISAM 7360/nokia.isam.mem.total[{#SNMPINDEX}])>={$MEM.CRIT}
        name: '{#BOARD}: memory usage above {$MEM.CRIT}%'
        priority: HIGH
        manual_close: 'YES'
      - uuid: 22fc69d518494f6c89dc647034bfe244
        expression: 100*last(/Nokia ISAM 7360/nokia.isam.mem.abs[{#SNMPINDEX}])/last(/Nokia ISAM 7360/nokia.isam.mem.total[{#SNMPINDEX}])>={$MEM.WARN}
        name: '{#BOARD}: memory usage above {$MEM.WARN}%'
        priority: WARNING
        manual_close: 'YES'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var b = parseInt(String(r['{#SNMPINDEX}']), 10);\n    r['{#BOARD}'] = b === 4353 ? 'NT-A'\n                  : b === 4354 ? 'NT-B'\n                  : 'LT-1-1-' + (b - 4354);\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }\n"
    - uuid: 6e4e60eaa8b54957941af4b6b0946b13
      name: PON ports (PONUTIL)
      type: SNMP_AGENT
      snmp_oid: discovery[{#ACTIVEONTS},1.3.6.1.4.1.637.61.1.35.21.57.1.16]
      key: nokia.isam.pon.discovery
      delay: 1h
      filter:
        evaltype: AND
        conditions:
        - macro: '{#ACTIVEONTS}'
          value: ^[1-9][0-9]*$
          formulaid: A
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: 'Discovers PON ports from the PONUTIL table (walk of column .16).

        PER-PORT PREREQUISITE: "configure pon interface 1/1/s/p utilization pon-pmcollect pm-enable".

        Default filter: only creates PONs with >=1 active ONT (remove the filter for all).

        '
      item_prototypes:
      - uuid: f28710787f2b493b8d14d1d62dfb8730
        name: 'PON {#PON}: bandwidth downstream'
        type: DEPENDENT
        key: nokia.isam.pon.down.bps[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        value_type: FLOAT
        trends: 730d
        units: bps
        description: Estimated downstream bandwidth = utilization(%) x line rate ({$PON.DOWN.BPS_PER_PCT}).
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '{$PON.DOWN.BPS_PER_PCT}'
        master_item:
          key: nokia.isam.pon.txtotutil[{#SNMPINDEX}]
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
      - uuid: 49eb80ee7b5a4d32b1d09baeeae95a77
        name: 'PON {#PON}: active ONTs'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.16.{#SNMPINDEX}
        key: nokia.isam.pon.numactiveonts[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        description: NUMACTIVEONTS - ONTs that passed traffic in the interval. Not an inventory count; fluctuates with traffic.
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: f04230c10ce444b1ab98ee9dc04296ec
          expression: max(/Nokia ISAM 7360/nokia.isam.pon.numactiveonts[{#SNMPINDEX}],{$PON.NOONT.TIME})=0
          name: 'PON {#PON}: no active ONT for {$PON.NOONT.TIME} (possible port down)'
          priority: WARNING
          manual_close: 'YES'
          description: No ONT passed traffic on this PON for the whole {$PON.NOONT.TIME} window. May indicate the port is down, or simply an idle PON at off-peak hours (NUMACTIVEONTS reflects traffic, not provisioned ONTs).
      - uuid: fb93328e79ec47d786bf4c4ed2c862c0
        name: 'PON {#PON}: RX dropped frames'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.28.{#SNMPINDEX}
        key: nokia.isam.pon.rxtotdropfrm[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: 730d
        description: RXTOTDROPFRM - frames dropped on receive during the interval (accumulates in the 5-min bin).
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - var v=value;var c=v.indexOf(':');if(c>=0&&/[A-Za-z]/.test(v.substring(0,c)))v=v.substring(c+1);var h=v.replace(/[^0-9A-Fa-f]/g,'');return h.length?parseInt(h,16):0;
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 0257e7a3d41f44ca8cb80599f1428605
          expression: last(/Nokia ISAM 7360/nokia.isam.pon.rxtotdropfrm[{#SNMPINDEX}])>{$PON.DROP.WARN}
          name: 'PON {#PON}: RX dropped frames above {$PON.DROP.WARN}'
          priority: AVERAGE
          manual_close: 'YES'
      - uuid: 99eaa1e73e1148f59eef18257ce3b70f
        name: 'PON {#PON}: utilization upstream'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.7.{#SNMPINDEX}
        key: nokia.isam.pon.rxtotutil[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        value_type: FLOAT
        trends: 730d
        units: '%'
        description: RXTOTUTIL - total receive (upstream) utilization of the PON.
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: fd230e12f2084c62bab92c083f852dce
          expression: min(/Nokia ISAM 7360/nokia.isam.pon.rxtotutil[{#SNMPINDEX}],15m)>{$PON.UTIL.WARN}
          name: 'PON {#PON}: upstream utilization above {$PON.UTIL.WARN}%'
          priority: WARNING
          manual_close: 'YES'
      - uuid: ccd52b391d824c63866570f283544d26
        name: 'PON {#PON}: utilization downstream'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.637.61.1.35.21.57.1.6.{#SNMPINDEX}
        key: nokia.isam.pon.txtotutil[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        value_type: FLOAT
        trends: 730d
        units: '%'
        description: TXTOTUTIL - total transmit (downstream) utilization of the PON, computed by the OLT.
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 8c7b180697f644ac8d220479e5d29d4a
          expression: min(/Nokia ISAM 7360/nokia.isam.pon.txtotutil[{#SNMPINDEX}],15m)>{$PON.UTIL.WARN}
          name: 'PON {#PON}: downstream utilization above {$PON.UTIL.WARN}%'
          priority: WARNING
          manual_close: 'YES'
      - uuid: c10491390e364d2e94c3792e75b633e3
        name: 'PON {#PON}: bandwidth upstream'
        type: DEPENDENT
        key: nokia.isam.pon.up.bps[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        value_type: FLOAT
        trends: 730d
        units: bps
        description: Estimated upstream bandwidth = utilization(%) x line rate ({$PON.UP.BPS_PER_PCT}).
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '{$PON.UP.BPS_PER_PCT}'
        master_item:
          key: nokia.isam.pon.rxtotutil[{#SNMPINDEX}]
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var idx = parseInt(String(r['{#SNMPINDEX}']), 10);\n    var off = idx - 0x05A00000;\n    var slot = Math.floor(off / 0x02000000) + 1;\n    var rem = off % 0x02000000;\n    var port = Math.floor(rem / 0x10000) + 1;\n    r['{#PON}'] = '1/1/' + slot + '/' + port;\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }\n"
    - uuid: dfea39b48bb545059dfa3f9522a32719
      name: PON port status & ONU inventory
      type: SNMP_AGENT
      key: nokia.isam.ponstatus.discovery
      snmp_oid: discovery[{#ACTIVEONTS},1.3.6.1.4.1.637.61.1.35.21.57.1.16]
      delay: 1h
      lifetime: 30d
      description: 'Discovers ALL PON ports from the PONUTIL table and reads their IF-MIB admin/oper

        status (PONUTIL index == PON ifIndex). No active-ONT filter, so empty and fully-down

        ports are included.'
      item_prototypes:
      - uuid: 0646341622d34a77ad20a42631995278
        name: 'PON {#PON}: port oper status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}
        key: nokia.isam.pon.operstatus[{#SNMPINDEX}]
        delay: 1m
        history: 90d
        trends: '0'
        value_type: UNSIGNED
        valuemap:
          name: Interface oper status
        description: 'ifOperStatus of the PON port (IF-MIB). On this ISAM the port reads DOWN when ALL ONTs

          on it are down; an empty port reads UP. For single-ONT ports, DOWN just means that

          customer is offline. A reliable "port down" alert is gated by provisioned-ONU count.'
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 57b19e5f65e44b44981365ece951e0b0
          expression: min(/Nokia ISAM 7360/nokia.isam.pon.operstatus[{#SNMPINDEX}],{$PON.DOWN.TIME})=2 and last(/Nokia ISAM 7360/nokia.isam.pon.adminstatus[{#SNMPINDEX}])=1 and last(/Nokia ISAM 7360/nokia.isam.pon.onucount[{#SNMPINDEX}])>=2
          name: 'PON {#PON}: port DOWN with 2+ ONUs (possible fiber/port fault)'
          priority: HIGH
          manual_close: 'YES'
          description: 'The PON port has been operationally down for {$PON.DOWN.TIME} while admin-up and

            having 2+ provisioned ONUs (all down together). Strong signal of a real port/fiber

            fault. Single-ONU ports are excluded to avoid alarming on a single offline customer.'
      - uuid: 6e7e7f9f0a474d9498491375469dd6b7
        name: 'PON {#PON}: port admin status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}
        key: nokia.isam.pon.adminstatus[{#SNMPINDEX}]
        delay: 5m
        history: 90d
        trends: '0'
        value_type: UNSIGNED
        valuemap:
          name: Interface admin status
        description: ifAdminStatus of the PON port (IF-MIB). 1=up, 2=down (administratively disabled).
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
      - uuid: 89a41d546aaf4c76beaff97dbfe33dec
        name: 'PON {#PON}: provisioned ONUs'
        type: DEPENDENT
        key: nokia.isam.pon.onucount[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 365d
        value_type: UNSIGNED
        master_item:
          key: nokia.isam.ont.walk
        description: Number of provisioned ONUs on this PON port, counted from the bulk-walk master item. Provisioned (configured), not active.
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - var idx='{#SNMPINDEX}';var n=0;var L=value.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/35\.11\.4\.1\.1\.(\d+)\.\d+/);if(m&&m[1]===idx)n++;}return n;
        tags:
        - tag: component
          value: PON
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 9499eed3d0fd43bc90caccd0d1174fa6
          expression: last(/Nokia ISAM 7360/nokia.isam.pon.onucount[{#SNMPINDEX}])>={$PON.ONU.WARN}
          name: 'PON {#PON}: provisioned ONUs near limit ({$PON.ONU.WARN}/{$PON.ONU.MAX})'
          priority: WARNING
          manual_close: 'YES'
          description: The PON port is approaching the {$PON.ONU.MAX}-ONU limit. Plan a split or rebalance.
      - uuid: 814a1ccdb89247f88d31ebc61d5f83ad
        name: 'PON {#PON}: active ONT PLOAM alarms'
        type: DEPENDENT
        key: nokia.isam.pon.ploam[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 365d
        value_type: UNSIGNED
        master_item:
          key: nokia.isam.alarm.typewalk
        description: 'ONTs of this PON currently in PLOAM fault of any kind (dying-gasp+inactive combined).

          For cause-specific alerting see the dedicated dying-gasp (power) and inactive (fiber)

          items/triggers on this same PON.'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var target=parseInt('{#SNMPINDEX}');var n=0;var ONT=0x5C00000,PON=0x5A00000;for(var k in p.T){if(p.T[k]!==40)continue;var x=p.X[k];if(x===undefined)continue;var off=x-ONT;if(off<0)continue;var slot=Math.floor(off/0x2000000);var rem=off%0x2000000;var pon=Math.floor(rem/0x10000);var ponIf=PON+slot*0x2000000+pon*0x10000;if(ponIf===target)n++;}return n;
        tags:
        - tag: component
          value: Alarms
        - tag: pon
          value: '{#PON}'
        trigger_prototypes: []
      - uuid: e1056f7310544077b07f9fbd239aa49e
        name: 'PON {#PON}: active dying-gasp alarms (power)'
        type: DEPENDENT
        key: nokia.isam.pon.dyinggasp[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 365d
        value_type: UNSIGNED
        master_item:
          key: nokia.isam.alarm.typewalk
        description: ONTs on this PON with an active dying-gasp alarm (power loss). Several at once suggests a localized power problem on this branch, not fiber.
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var target=parseInt('{#SNMPINDEX}');var n=0;var ONT=0x5C00000,PON=0x5A00000;for(var k in p.T){if(p.T[k]!==40)continue;if(((p.S[k]||0) & 262144)===0)continue;var x=p.X[k];if(x===undefined)continue;var off=x-ONT;if(off<0)continue;var slot=Math.floor(off/0x2000000);var rem=off%0x2000000;var pon=Math.floor(rem/0x10000);var ponIf=PON+slot*0x2000000+pon*0x10000;if(ponIf===target)n++;}return n;
        tags:
        - tag: component
          value: Alarms
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 7f9b301f0251458caac1627a87691494
          expression: last(/Nokia ISAM 7360/nokia.isam.pon.dyinggasp[{#SNMPINDEX}])>={$ALARM.DYINGGASP.PON.WARN}
          name: 'PON {#PON}: possible localized power outage ({ITEM.LASTVALUE1} ONTs dying-gasp)'
          priority: AVERAGE
          manual_close: 'YES'
          description: '{$ALARM.DYINGGASP.PON.WARN}+ ONTs on this single PON reported dying-gasp at once - power issue on this branch, not fiber.'
      - uuid: 88a547dd1a4245c585ea93eb253edb00
        name: 'PON {#PON}: active inactive/LOS alarms (fiber)'
        type: DEPENDENT
        key: nokia.isam.pon.inactive[{#SNMPINDEX}]
        delay: '0'
        history: 90d
        trends: 365d
        value_type: UNSIGNED
        master_item:
          key: nokia.isam.alarm.typewalk
        description: ONTs on this PON with an active inactive alarm (fiber/signal loss). Several at once suggests a branch-fiber problem on this port, not power.
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - function parse(v){var T={},S={},X={};var L=v.split('\n');for(var i=0;i<L.length;i++){var m=L[i].match(/3\.7\.1\.(\d+)\.(\d+)\s*=\s*(?:INTEGER:\s*)?(-?\d+)/);if(!m)continue;var col=m[1],idx=m[2],val=parseInt(m[3]);if(col==='2')T[idx]=val;else if(col==='3')S[idx]=val;else if(col==='4')X[idx]=val;}return {T:T,S:S,X:X};}var p=parse(value);var target=parseInt('{#SNMPINDEX}');var n=0;var ONT=0x5C00000,PON=0x5A00000;for(var k in p.T){if(p.T[k]!==40)continue;if(((p.S[k]||0) & 32768)===0)continue;var x=p.X[k];if(x===undefined)continue;var off=x-ONT;if(off<0)continue;var slot=Math.floor(off/0x2000000);var rem=off%0x2000000;var pon=Math.floor(rem/0x10000);var ponIf=PON+slot*0x2000000+pon*0x10000;if(ponIf===target)n++;}return n;
        tags:
        - tag: component
          value: Alarms
        - tag: pon
          value: '{#PON}'
        trigger_prototypes:
        - uuid: 092aedf5d276434ba64cd71c1f6def24
          expression: last(/Nokia ISAM 7360/nokia.isam.pon.inactive[{#SNMPINDEX}])>={$ALARM.INACTIVE.PON.WARN}
          name: 'PON {#PON}: possible branch-fiber problem ({ITEM.LASTVALUE1} ONTs inactive/LOS)'
          priority: AVERAGE
          manual_close: 'YES'
          description: '{$ALARM.INACTIVE.PON.WARN}+ ONTs on this single PON went inactive at once - fiber/splitter issue on this branch, not power.'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "try {\n  var d = JSON.parse(value);\n  var rows = Array.isArray(d) ? d : d.data;\n  rows.forEach(function(r){\n    var idx = parseInt(String(r['{#SNMPINDEX}']), 10);\n    var off = idx - 0x05A00000;\n    var slot = Math.floor(off / 0x02000000) + 1;\n    var rem = off % 0x02000000;\n    var port = Math.floor(rem / 0x10000) + 1;\n    r['{#PON}'] = '1/1/' + slot + '/' + port;\n  });\n  return JSON.stringify(Array.isArray(d) ? rows : {data: rows});\n} catch (e) { return value; }\n"
    macros:
    - macro: '{$ALARM.DYINGGASP.PON.WARN}'
      value: '10'
      description: Simultaneous active dying-gasp alarms on a SINGLE PON suggesting a localized power issue on that branch.
    - macro: '{$ALARM.INACTIVE.PON.WARN}'
      value: '10'
      description: Simultaneous active inactive alarms on a SINGLE PON suggesting a fiber problem on that branch.
    - macro: '{$ALARM.PLOAM.PON.WARN}'
      value: '5'
      description: Simultaneous active PLOAM alarms on a SINGLE PON that suggest a branch-fiber problem on that port (complements the all-ONTs-down gated trigger).
    - macro: '{$ALARM.PLOAM.WARN}'
      value: '10'
      description: Number of simultaneous active ONT PLOAM alarms (LOS/dying-gasp/etc.) that suggests a mass outage rather than isolated offline customers.
    - macro: '{$CPU.CRIT}'
      value: '90'
      description: CPU threshold (%) for high alert.
    - macro: '{$CPU.WARN}'
      value: '80'
      description: CPU threshold (%) for warning.
    - macro: '{$FAN.MODE.EXPECTED}'
      value: '2'
      description: Expected chassis FAN mode (0=default,1=eco,2=protect,3=classic). Trigger fires when the actual mode differs.
    - macro: '{$MEM.CRIT}'
      value: '95'
      description: Memory usage threshold (%) for high alert.
    - macro: '{$MEM.WARN}'
      value: '90'
      description: Memory usage threshold (%) for warning.
    - macro: '{$PON.DOWN.BPS_PER_PCT}'
      value: '24883200'
      description: bps per 1% downstream. GPON=24883200, XGS-PON=99532800.
    - macro: '{$PON.DOWN.TIME}'
      value: 15m
      description: Sustained window a PON port must stay operationally down before the (gated) port-down alert fires.
    - macro: '{$PON.DROP.WARN}'
      value: '200'
      description: Dropped-frames-per-interval threshold for alert.
    - macro: '{$PON.NOONT.TIME}'
      value: 1h
      description: Sustained window with zero active ONTs before flagging a PON as possibly down. Beware quiet PONs at off-peak hours (NUMACTIVEONTS reflects traffic, not provisioned ONTs).
    - macro: '{$PON.ONU.MAX}'
      value: '128'
      description: Max provisioned ONUs per PON port (GPON hard limit).
    - macro: '{$PON.ONU.WARN}'
      value: '112'
      description: Provisioned-ONU count that triggers a near-limit warning (approaching {$PON.ONU.MAX}).
    - macro: '{$PON.UP.BPS_PER_PCT}'
      value: '12441600'
      description: bps per 1% upstream. GPON=12441600, XGS-PON=99532800, XG-PON=24883200.
    - macro: '{$PON.UTIL.WARN}'
      value: '90'
      description: Utilization threshold (%) for alert.
    - macro: '{$SNMP_COMMUNITY}'
      value: public
      description: OLT SNMP v2c community.
