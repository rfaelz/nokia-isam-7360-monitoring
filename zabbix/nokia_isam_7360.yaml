zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 2560f307c7934bc887c15d766d67f5f5
    name: Templates/Nokia ISAM
  templates:
  - uuid: 7527b84819be4a2eaf98aa816fc3cfdf
    template: Nokia ISAM 7360
    name: Nokia ISAM 7360
    description: 'Full monitoring of the Nokia 7360 ISAM FX (OLT level) in a single template:

      per-PON utilization/traffic, uplink XFP optics, temperature and memory of all

      boards (LLD), management-plane uptime and per-board CPU (LLD). Link this template

      to the host (SNMP interface + {$SNMP_COMMUNITY} macro). OLT prerequisites:

      pon-pmcollect pm-enable (PONs) and cpu-load monitor start (CPU).

      '
    groups:
    - name: Templates/Nokia ISAM
    items:
    - uuid: 41e08adaf5fd4520ab1ec7aae2f8ae40
      name: Chassis FAN mode
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.637.61.1.23.1.9.0
      key: nokia.isam.fanmode
      delay: 1h
      history: 90d
      trends: '0'
      description: Chassis FAN operating mode (0=default, 1=eco, 2=protect, 3=classic).
      valuemap:
        name: Nokia fan mode
      tags:
      - tag: component
        value: System
      triggers:
      - uuid: 824db92eb6704cc49b3027d86a64dd43
        expression: last(/Nokia ISAM 7360/nokia.isam.fanmode)<>{$FAN.MODE.EXPECTED}
        name: 'Chassis FAN mode outside expected (current: {{ITEM.LASTVALUE1}})'
        priority: INFO
        description: The chassis FAN mode left the expected mode ({$FAN.MODE.EXPECTED}). Change is manual; verify it was intentional and close the problem.
        manual_close: 'YES'
    - uuid: 4e278b449c1d4f358f84b335f24dd0aa
      name: Firmware version
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: nokia.isam.firmware
      delay: 1h
      history: 30d
      value_type: CHAR
      trends: '0'
      description: Firmware version extracted from sysDescr (first token, e.g. R6.2.04sj).
      preprocessing:
      - type: REGEX
        parameters:
        - ^(\S+)
        - \1
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: component
        value: System
      triggers:
      - uuid: 972c428137924242b80954ac35fceb62
        expression: change(/Nokia ISAM 7360/nokia.isam.firmware)<>0
        name: Firmware version changed (was {{ITEM.LASTVALUE1}})
        priority: INFO
        description: The OLT firmware version changed from the previous reading. May indicate an upgrade/downgrade. Acknowledge and close after validating.
        manual_close: 'YES'
    - uuid: 05c69e1650f644d8970891704437c8a5
